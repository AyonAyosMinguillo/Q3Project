<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Q3PROJECT_FareMatrix</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">

<style>
body {
    font-family: 'Plus Jakarta Sans', sans-serif;
    margin: 0;
    background-image: url("manilamap.png");
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
    background-attachment: fixed;
    color: white;
}

.navbar-glass {
    background: rgba(255, 255, 255, 0.15);
    backdrop-filter: blur(8px);
    border-bottom: 4px solid #cbd0d8;
    box-shadow: 2px 2px 10px #c2c2c2;
}

.nav-text {
    color: #33456b;
    font-weight: 600;
}

.nav-text:hover {
    color: #1f2f52;
}

.box {
    border-radius: 16px;
    max-width: 500px;
    padding: 35px;
    border: 4px solid #cbd0d8;
    box-shadow: 0px 4px 20px rgba(0, 0, 0, 0.6);
    background: rgba(11, 58, 90, 0.322);
    backdrop-filter: blur(8px);
    margin: 80px auto;
}

.btn-custom {
    background: #ffffff;
    color: #33456b;
    font-weight: 600;
    border: none;
}

.btn-custom:hover {
    background: #d9d9d9;
}

.btn-logout {
    position: fixed;
    bottom: 20px;
    right: 20px;
}
</style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-light navbar-glass">
    <div class="container-fluid justify-content-center">
        <div class="d-flex align-items-center gap-4">
            <a class="nav-link nav-text" href="Home.html">Home Page</a>
            <a class="nav-link nav-text" href="Fare.html">Fare Estimator</a>
            <a class="navbar-brand m-0" href="https://youtu.be/ZUHpUXlsvbI?si=TMxtZTi_FiJkN9ag&t=45">
                <img src="bouks.png" alt="FareRides Logo" width="120">
            </a>
            <a class="nav-link nav-text" href="HelpPage.html">Help</a>
            <a class="nav-link nav-text" href="AboutUs.html">About Us</a>
            
        </div>
    </div>
</nav>

<div class="box">

    <h3 class="text-center mb-4" style="font-style: bold;">Fare Estimator</h3>

    <div class="mb-3">
        <label class="form-label">Select Line</label>
        <select class="form-select" id="lineSelect" onchange="updateStations()">
            <option value="" selected disabled>Select a Line</option>
            <option value="mrt3">MRT-3</option>
            <option value="lrt1">LRT-1</option>
            <option value="lrt2">LRT-2</option>
        </select>
    </div>

    <div class="mb-3">
        <label class="form-label">Pickup Station</label>
        <select class="form-select" id="pickup">
            <option value="" selected disabled>Select a Station</option>
        </select>
    </div>

    <div class="mb-3">
        <label class="form-label">Drop-off Station</label>
        <select class="form-select" id="dropoff">
            <option value="" selected disabled>Select a Station</option>
        </select>
    </div>

    <div class="form-check mb-4">
        <input class="form-check-input" type="checkbox" id="disc">
        <label class="form-check-label">
            20% Discount (Senior / Student / PWD)
        </label>
    </div>

    <button onclick="calculateFare()" class="btn btn-custom w-100">
        Compute Fare
    </button>
    <div class="text-center mt-4">
        <small>Estimated Total</small>
        <h2 id="DisplayAns">Php 0.00</h2>
        <small id="DisplayKM"></small>
    </div>

</div>

<a href="https://www.google.com" class="btn btn-outline-danger btn-logout">Logout</a>

<script>
// i wanted to show off so here is the list of stations
const stations = {
    mrt3: ["North Avenue","Quezon Avenue","GMA-Kamuning","Cubao","Santolan-Annapolis","Ortigas","Shaw Boulevard","Boni","Guadalupe","Buendia","Ayala","Magallanes","Taft Avenue"],
    lrt1: ["Roosevelt","Balintawak","Monumento","5th Avenue","R. Papa","Abad Santos","Blumentritt","Tayuman","Bambang","Doroteo Jose","Carriedo","Central Terminal","United Nations","Pedro Gil","Quirino Avenue","Vito Cruz","Gil Puyat","Libertad","EDSA","Baclaran"],
    lrt2: ["Recto","Legarda","Pureza","V. Mapa","J. Ruiz","Gilmore","Betty Go-Belmonte","Cubao","Anonas","Katipunan","Santolan","Marikina-Pasig","Antipolo"]
};

function getDistance(line, pickupIndex, dropIndex){
    return Math.abs(pickupIndex - dropIndex) * 2; 
}
function updateStations() {
    let line = document.getElementById("lineSelect").value;
    let pickupSelect = document.getElementById("pickup");
    let dropSelect = document.getElementById("dropoff");

    pickupSelect.innerHTML = '<option value="" selected disabled>N/A</option>';
    dropSelect.innerHTML = '<option value="" selected disabled>N/A</option>';

    stations[line].forEach((station, index) => {
        let optionPickup = document.createElement("option");
        optionPickup.value = index;
        optionPickup.text = station;
        pickupSelect.add(optionPickup);

        let optionDrop = document.createElement("option");
        optionDrop.value = index;
        optionDrop.text = station;
        dropSelect.add(optionDrop);
    });
}

function calculateFare() {
    let line = document.getElementById("lineSelect").value;
    let pickup = parseInt(document.getElementById("pickup").value);
    let dropoff = parseInt(document.getElementById("dropoff").value);
    let discount = document.getElementById("disc").checked;

    if (isNaN(pickup) || isNaN(dropoff) || !line) {
        alert("Please select a line and both stations.");
        return;
    }

    let distance = getDistance(line, pickup, dropoff);

    let basefare = 20;
    let perKMrate = 4;
    let baseKM = 3;
    let extraKM = Math.max(distance - baseKM, 0);
    let fare = basefare + (extraKM * perKMrate);

    if(discount){
        fare *= 0.8;
    }

    document.getElementById("DisplayAns").innerHTML = "Php " + fare.toFixed(2);
    document.getElementById("DisplayKM").innerHTML = distance + " km";
}

updateStations();
</script>

</body>
</html>
