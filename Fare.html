<div class="container">

<!--add the fair matrix here guys -->
<div class="container mt-5">
    <div class="row g-4">
    <div class="col-md-6">
    <div class="box">
<h3 style="color: #33456b; font-weight: 567;" class="text-center mb-4">Rail Transit Fare</h3>
    <div class="mb-3">
    <label class="form-label" style="color: #33456b; font-weight: 567;">Select Line</label>

<select class="form-select" id="lineSelect" onchange="updateStations()">
    <option value="" selected disabled>Select a Line</option>
        <option value="mrt3">MRT-3</option>
        <option value="lrt1">LRT-1</option>
        <option value="lrt2">LRT-2</option>
    </select>
</div>

<div class="mb-3">
     <label class="form-label" style="color: #33456b; font-weight: 567;">Origin Station</label>
     <select class="form-select" id="pickup">
        <option value="" selected disabled>Select a Station</option>
    </select>
</div>

<div class="mb-3">
<label class="form-label" style="color: #33456b; font-weight: 567;">Destination Station</label>
    <select class="form-select" id="dropoff">
    <option value="" selected disabled>Select a Station</option>
    </select>
</div>

<button onclick="calculateFare()" class="btn btn-custom w-100 mt-3">Get Fare</button>
    </div>
</div>

<div class="col-md-6">
<div class="box text-center">

    <h3 class="mb-4" style="color: #33456b; font-weight: 567;">Fare Breakdown</h3>
     <p style="color: #33456b; font-weight: 567;" >Base Fare</p>
     <h3 id="DisplayBase" style="text-shadow: #33456b 1px 1px 5px;">Php 40.00</h3>
<br>
    <p style="color: #33456b; font-weight: 567;">Kilometers Travelled</p>
    <h3 id="DisplayKM" style="text-shadow: #33456b 1px 1px 5px;">0 km</h3>

<br>

<p style="color: #33456b; font-weight: 567;">Total Fare</p>
<h2 id="DisplayAns" style="text-shadow: #33456b 1px 1px 5px;">Php 0.00</h2>
</div>
</div>

<div class="box text-center">
    <h3 class="mb-3" style="color: #33456b; font-weight: 567;">Discount Options</h3>

<div class="form-check d-flex justify-content-center gap-2">
    <input class="form-check-input" type="checkbox" id="disc" style="box-shadow: #33456b 1px 1px 5px;">
    <label class="form-check-label" style="text-shadow: #33456b 1px 1px 5px;">Apply 20% Discount (For Senior / Student / PWD)</label>

</div>
</div>

<script>

const stations = {

mrt3:[
"North Avenue","Quezon Avenue","GMA-Kamuning","Cubao",
"Santolan-Annapolis","Ortigas","Shaw Boulevard","Boni",
"Guadalupe","Buendia","Ayala","Magallanes","Taft Avenue"
],

lrt1:[
"Roosevelt","Balintawak","Monumento","5th Avenue","R. Papa",
"Abad Santos","Blumentritt","Tayuman","Bambang","Doroteo Jose",
"Carriedo","Central Terminal","United Nations","Pedro Gil",
"Quirino Avenue","Vito Cruz","Gil Puyat","Libertad","EDSA","Baclaran"
],

lrt2:[
"Recto","Legarda","Pureza","V. Mapa","J. Ruiz","Gilmore",
"Betty Go-Belmonte","Cubao","Anonas","Katipunan","Santolan",
"Marikina-Pasig","Antipolo"
]

};
function getDistance(line,pickupIndex,dropIndex){

return Math.abs(pickupIndex - dropIndex) * 2;

}

function updateStations(){

let line=document.getElementById("lineSelect").value;

let pickupSelect=document.getElementById("pickup");
let dropSelect=document.getElementById("dropoff");

pickupSelect.innerHTML='<option value="" selected disabled>N/A</option>';
dropSelect.innerHTML='<option value="" selected disabled>N/A</option>';

stations[line].forEach((station,index)=>{

let optionPickup=document.createElement("option");
optionPickup.value=index;
optionPickup.text=station;
pickupSelect.add(optionPickup);

let optionDrop=document.createElement("option");
optionDrop.value=index;
optionDrop.text=station;
dropSelect.add(optionDrop);

});
}
function calculateFare(){

let line=document.getElementById("lineSelect").value;
let pickup=parseInt(document.getElementById("pickup").value);
let dropoff=parseInt(document.getElementById("dropoff").value);
let discount=document.getElementById("disc").checked;

if(isNaN(pickup)||isNaN(dropoff)||!line){

alert("Please select a line and both stations.");
return;

}

let distance=getDistance(line,pickup,dropoff);

let basefare=40;
let perKMrate=8;
let baseKM=3;

let extraKM=Math.max(distance-baseKM,0);

let fare=basefare+(extraKM*perKMrate);

if(discount){
fare*=0.8;
}

document.getElementById("DisplayBase").innerHTML="Php "+basefare.toFixed(2);
document.getElementById("DisplayKM").innerHTML=distance+" km";
document.getElementById("DisplayAns").innerHTML="Php "+fare.toFixed(2);

}

</script>
