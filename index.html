<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Q3PROJECT_REGISTRATION</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap"
        rel="stylesheet">

    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            margin: 0;
            background-image: url("manilamap.png");
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
        }


        .navbar {
            border-bottom: 4px solid #cbd0d8;
            box-shadow: 2px 2px 20px #4e4c4c;
            color: white
            
        }
        .navbar-glass{
        background: rgba(255,255,255,0.15);
        backdrop-filter: blur(8px);
        border-bottom: 4px solid #cbd0d8;
        box-shadow: 2px 2px 10px #c2c2c2;
        }


        .box {
            border-radius: 16px;
            max-width: 1000px;
            padding: 40px;
            border: 4px solid #cbd0d8;
            box-shadow: 0px 4px 20px rgba(0, 0, 0, 0.6);
            background: rgba(39, 115, 165, 0.08);
            backdrop-filter: blur(8px);
            margin: 40px auto;
        }


        .profile-circle {
            width: 200px;
            height: 200px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.25);
            margin: 20px auto;
            background-size: cover;
            background-position: center;
            border: 3px solid #cbd0d8;
        }


        .btn-custom {
            background: #ffffff;
            color: #33456b;
            font-weight: 600;
            border: none;
        }

        .btn-custom:hover {
            background: #d9d9d9;
        }

        #output {
            margin-top: 20px;
            font-weight: 600;
        }
    </style>
</head>

<body>

<nav class="navbar navbar-expand-lg navbar-light navbar-glass">
    <div class="container-fluid justify-content-center">
        <div class="d-flex align-items-center gap-4">
                <img src="ARROW.png" alt="FareRides Logo" width="120">
        </div>
    </div>
</nav>

    <div class="box text-center">
        <h2><img src="bigustexus.png" alt="Text" height="67px"></h2>
        <p><p>Go out and find how much you will spend!</p>
        </p>
        <p style="font-style: italic; font-size: smaller;">By 3 People Co.
        </p>
    </div>

    <div class="box">

        <div class="row">

            <div class="col-md-8">

                <div class="row mb-3">
                    <div class="col-md-6">
                        <label class="form-label">Last Name</label>
                        <input type="text" id="lname" class="form-control">
                    </div>

                    <div class="col-md-6">
                        <label class="form-label">First Name</label>
                        <input type="text" id="fname" class="form-control">
                    </div>
                </div>

                <div class="row mb-3">
                    <div class="col-md-6">
                        <label class="form-label">Date of Birth</label>
                        <input type="date" id="dob" class="form-control">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Contact Number</label>

                        <div class="input-group">
                            <select class="form-select" id="countryCode" style="max-width:110px;">
                                <option value="00">00</option>
                                <option value="+63">+63</option>
                                <option value="+1">+1</option>
                                <option value="+67">+67</option>
                            </select>

                            <input type="text" id="contact" class="form-control" placeholder="Enter number">
                        </div>

                    </div>
                </div>

                <div class="mb-3">
                    <label class="form-label">Email</label>
                    <input type="email" id="email" class="form-control">
                </div>

                <div class="row mb-4">
                    <div class="col-md-6">
                        <label class="form-label">Password</label>
                        <input type="password" id="password" class="form-control"
                            placeholder="Must be at least 8 characters">
                    </div>

                    <div class="col-md-6">
                        <label class="form-label">Confirm Password</label>
                        <input type="password" id="confirmPassword" class="form-control">
                    </div>
                </div>


                <div class="text-end">
                    <button class="btn btn-custom px-4" onclick="registerUser()">Sign Up</button>
                </div>

                <div id="output"></div>

            </div>

            <!-- the star of the show vvvvvv --->
            <div class="col-md-4 text-center">

                <div id="previewCircle" class="profile-circle"></div>

                <input type="file" class="form-control mt-3" accept="image/*" onchange="previewImage(event)">

            </div>

        </div>

    </div>


<script>

function registerUser() {

    let firstName = document.getElementById("fname").value;
    let lastName = document.getElementById("lname").value;
    let email = document.getElementById("email").value;
    let dob = document.getElementById("dob").value;

    let countryCode = document.getElementById("countryCode").value;
    let contactNumber = document.getElementById("contact").value;

    let password = document.getElementById("password").value;
    let confirmPassword = document.getElementById("confirmPassword").value;

    let fullName = firstName + " " + lastName;
    let fullContact = countryCode + contactNumber;

    if (firstName === "" || lastName === "" || email === "" ||
        dob === "" || contactNumber === "" ||
      password === "" || confirmPassword === "") {

        document.getElementById("output").innerHTML =
        "<p class='text-warning'>HEY! SIGN UP PROPERLY!</p>";
        return;
    
    }

let emailPattern = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
if (!emailPattern.test(email)) {
    document.getElementById("output").innerHTML =
        "<p class='text-danger'>Please insert a valid email!</p>";
    return;
}

    let birthYear = new Date(dob).getFullYear();

    if (birthYear >= 2012) {
        document.getElementById("output").innerHTML =
            "<p class='text-danger'>Too young buddy.</p>";
        return;
    }

    if (password !== confirmPassword) {
        document.getElementById("output").innerHTML =
            "<p class='text-danger'>Hey man, the passwords you gave aren't quite the same!</p>";
        return;
    }

    alert("Thank you, " + fullName + " you have succesfully signed up! Love ya man!");

    window.location.href = "Home.html";
}


function previewImage(event) {

    let reader = new FileReader();

    reader.onload = function () {
        let circle = document.getElementById("previewCircle");
        circle.style.backgroundImage = "url('" + reader.result + "')";
    };

    reader.readAsDataURL(event.target.files[0]);
}

</script>

</body>

</html>
